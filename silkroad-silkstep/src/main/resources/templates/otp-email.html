<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OTP Verification</title>
</head>
<body style="margin:0;padding:0;background:#f6f8fa;font-family:Arial,sans-serif;">

<div style="max-width:600px;margin:40px auto;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,0.08);">

    <!-- Header -->
    <div style="background:#0f766e;padding:20px;text-align:center;color:white;">
        <h2 style="margin:0;font-size:20px;">SilkStep Booking</h2>
        <p style="margin:5px 0 0;font-size:13px;opacity:0.9;">Email Verification Code</p>
    </div>

    <!-- Body -->
    <div style="padding:30px;text-align:center;">

        <h3 style="color:#111827;margin-bottom:10px;">Confirm Your Email</h3>

        <p style="color:#6b7280;font-size:14px;line-height:1.6;">
            Use the OTP code below to confirm your booking and continue the process.
        </p>

        <!-- OTP BOX -->
        <div style="margin:25px auto;padding:15px 25px;display:inline-block;
                  font-size:28px;letter-spacing:6px;font-weight:bold;
                  background:#ecfeff;color:#0f766e;border-radius:10px;
                  border:1px dashed #0f766e;">
            :otp_code
        </div>

        <p style="color:#9ca3af;font-size:12px;margin-top:20px;">
            This code is valid for a limited time. Do not share it with anyone.
        </p>

    </div>

    <!-- Footer -->
    <div style="background:#f3f4f6;padding:15px;text-align:center;font-size:12px;color:#6b7280;">
        © 2026 SilkStep. All rights reserved.
    </div>

</div>

</body>
</html>

<!--HTML email template for sending a one-time password.
Backend replaces :otp_code with real code and sends it to user.-->
